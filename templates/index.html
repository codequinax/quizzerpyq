
{% extends "layout.html" %}
{% block content %}

<style>

/* Animated background particles */

.bg-animation{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.bg-animation span{
position:absolute;
width:20px;
height:20px;
background:rgba(59,130,246,0.15);
border-radius:50%;
animation:float 18s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}

/* Glass tiles */

.tile{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
border-radius:16px;
padding:30px;
transition:0.35s;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.dark-mode .tile{
background:rgba(30,41,59,0.7);
}

.tile:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* Titles */

.hero-title{
font-size:2rem;
font-weight:600;
}

.hero-sub{
color:#6b7280;
margin-bottom:25px;
}

/* Dropdown */

.form-select{
padding:12px;
border-radius:10px;
}

/* Button */

.start-btn{
padding:14px;
font-size:1.1rem;
border-radius:12px;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.04);
box-shadow:0 10px 25px rgba(59,130,246,0.4);
}

/* Responsive */

@media(max-width:768px){

.hero-title{
font-size:1.5rem;
}

.tile{
padding:20px;
}

}

</style>


<!-- Background Animation -->

<div class="bg-animation">
<span style="left:10%;animation-duration:18s"></span>
<span style="left:25%;animation-duration:20s"></span>
<span style="left:40%;animation-duration:16s"></span>
<span style="left:55%;animation-duration:22s"></span>
<span style="left:70%;animation-duration:19s"></span>
<span style="left:85%;animation-duration:21s"></span>
</div>


<div class="container py-4">

<!-- HERO -->

<div class="text-center mb-5" data-aos="fade-down">

<h2 class="hero-title">🚀 Quizzer PYQ</h2>

<p class="hero-sub">
Practice Previous Year Questions by selecting your Year, Subject and Unit
</p>

</div>


<div class="row justify-content-center">

<div class="col-lg-7 col-md-9 col-12">

<div class="tile" data-aos="zoom-in">

<form method="post" action="/questions">

<!-- YEAR -->

<div class="mb-4">

<label class="form-label fw-semibold">
<i class="fa-solid fa-calendar text-primary me-2"></i>
Select Year
</label>

<select class="form-select" name="year" id="year" required onchange="fetchSubjects()">

<option value="">Choose Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>

</select>

</div>


<!-- SUBJECT -->

<div class="mb-4">

<label class="form-label fw-semibold">
<i class="fa-solid fa-book text-success me-2"></i>
Select Subject
</label>

<select class="form-select" name="subject" id="subject" required onchange="fetchUnits()">

<option value="">Choose Subject</option>

</select>

</div>


<!-- UNIT -->

<div class="mb-4">

<label class="form-label fw-semibold">
<i class="fa-solid fa-layer-group text-warning me-2"></i>
Select Unit
</label>

<select class="form-select" name="unit" id="unit" required>

<option value="">Choose Unit</option>

</select>

</div>


<div class="d-grid mt-4">

<button type="submit" class="btn btn-primary start-btn">

🎯 Start Practice

</button>

</div>

</form>

</div>

</div>

</div>

</div>


<script>

async function fetchSubjects(){

const year=document.getElementById('year').value;

const res=await fetch('/get_subjects',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:`year=${encodeURIComponent(year)}`
});

const data=await res.json();

const subjectSelect=document.getElementById('subject');

subjectSelect.innerHTML='<option value="">Choose Subject</option>';

data.subjects.forEach(sub=>{
subjectSelect.innerHTML+=`<option value="${sub}">${sub}</option>`;
});

}


async function fetchUnits(){

const year=document.getElementById('year').value;
const subject=document.getElementById('subject').value;

const res=await fetch('/get_units',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:`year=${encodeURIComponent(year)}&subject=${encodeURIComponent(subject)}`
});

const data=await res.json();

const unitSelect=document.getElementById('unit');

unitSelect.innerHTML='<option value="">Choose Unit</option>';

data.units.forEach(unit=>{
unitSelect.innerHTML+=`<option value="${unit}">${unit}</option>`;
});

}

</script>


{% endblock %}
