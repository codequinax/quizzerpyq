<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PYQ Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- AOS Animations -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --light-bg: linear-gradient(to right, #eef2ff, #e0f7fa);
      --dark-bg: linear-gradient(to right, #1f2937, #111827);
      --card-light: rgba(255, 255, 255, 0.9);
      --card-dark: rgba(31, 41, 55, 0.8);
      --text-light: #1f2937;
      --text-dark: #f3f4f6;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--light-bg);
      color: var(--text-light);
      transition: background 0.4s, color 0.4s;
    }

    .dark-mode {
      background: var(--dark-bg);
      color: var(--text-dark);
    }

    .container-wrapper {
      max-width: 960px;
      margin: 80px auto 40px;
      padding: 30px;
      background-color: var(--card-light);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: background 0.4s;
    }

    .dark-mode .container-wrapper {
      background-color: var(--card-dark);
    }

    h2 {
      font-weight: 600;
      color: #2563eb;
    }

    .dark-mode h2 {
      color: #93c5fd;
    }

    .navbar {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
    }

    .navbar-brand, .nav-link {
      color: #fff !important;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .dark-toggle {
      border: none;
      background: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
    }

    ::selection {
      background: #3b82f6;
      color: #fff;
    }
  </style>
</head>

<body id="pageBody">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg shadow fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="fas fa-book-open-reader me-2"></i>PYQ Viewer
      </a>
      <div class="ms-auto">
        <button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container container-wrapper" data-aos="fade-down">
    {% block content %}{% endblock %}
  </div>

  <!-- Footer -->
  <div class="footer">
    Made with ❤️ by Quizzer Team | © 2025
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init({ once: true });

    function toggleDarkMode() {
      const body = document.getElementById('pageBody');
      body.classList.toggle('dark-mode');
    }
  </script>
</body>
</html>
